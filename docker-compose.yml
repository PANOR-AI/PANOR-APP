version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: panor_postgres
    environment:
      POSTGRES_USER: panor
      POSTGRES_PASSWORD: panorpassword
      POSTGRES_DB: panor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panor"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: panor_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://panor:panorpassword@db:5432/panor_db
      - SECRET_KEY=supersecretjwtkey12345
      - ALGORITHM=HS256

volumes:
  postgres_data:
